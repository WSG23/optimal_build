[type_ignore]
# Ratchet ceiling: current count of `# type: ignore` / `# mypy:` suppressions in
# production code (backend/, excluding backend/tests). The budget check fails if
# the count exceeds this value. The long-term goal is 0 — only lower this number,
# never raise it. Last reduced 2026-05-17.
production_baseline = 65
production_goal = 0
backend_tests_baseline = 74
tests_baseline = 7
required_metadata_keys = ["owner", "expires", "reason"]

