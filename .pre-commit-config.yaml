repos:
  - repo: local
    hooks:
      - id: audit-migrations
        name: audit-migrations
        entry: python3 scripts/audit_migrations.py
        language: system
        pass_filenames: false

      - id: check-migration-enums
        name: Check migration ENUM patterns
        entry: python3 scripts/check_migration_enums.py
        language: system
        pass_filenames: false
        files: ^(backend/)?migrations/versions/.*\.py$

      - id: pdf-smoke-test
        name: PDF generation smoke test
        entry: python3 scripts/smoke_test_pdfs.py
        language: system
        pass_filenames: false
        files: ^backend/app/(services/agents/.*|api/v1/commercial_property_packs\.py)$

      - id: phase-gate
        name: Phase 2D gate enforcement
        entry: python3 scripts/check_phase_gate.py
        language: system
        pass_filenames: false

      - id: check-shadow-dirs
        name: Check for shadow directories (Rule 14.1)
        entry: python3 scripts/check_shadow_directories.py
        language: system
        pass_filenames: false

      - id: check-enum-patterns
        name: Check SQLAlchemy enum patterns have values_callable
        entry: python3 backend/scripts/check_enum_patterns.py
        language: system
        files: ^backend/app/models/.*\.py$
        pass_filenames: true

      - id: check-documentation-whitelist
        name: Documentation whitelist enforcement (Rule 14.2)
        entry: python3 scripts/check_documentation_whitelist.py
        language: system
        pass_filenames: false
        files: ^docs/.*\.md$

      - id: check-ui-canon
        name: UI canon enforcement (inline styles, hardcoded colors)
        entry: python3 scripts/check_ui_canon.py
        language: system
        pass_filenames: false
        files: ^frontend/src/.*\.(tsx|css)$

      - id: type-guardrails
        name: Type guardrails
        entry: python3 scripts/check_type_guardrails.py --config-only --staged
        language: system
        pass_filenames: false

      - id: type-ignore-budget
        name: Type ignore budget
        entry: python3 scripts/check_type_ignore_budget.py
        language: system
        pass_filenames: false

      - id: warning-allowlist
        name: Warning allowlist policy
        entry: python3 scripts/check_warning_allowlist.py --fail-on-expired
        language: system
        pass_filenames: false

      - id: pip-audit
        name: Dependency vulnerability scan (pip-audit)
        entry: python3 scripts/run_pip_audit_with_allowlist.py --requirements backend/requirements.txt
        language: python
        additional_dependencies: ["pip-audit>=2.7,<3"]
        pass_filenames: false
        files: ^backend/requirements.*\.txt$

      - id: mypy-critical
        name: mypy (critical paths - blocks on new errors)
        entry: bash -c 'cd backend && ../.venv/bin/mypy app/api/ app/schemas/ --config-file=../mypy.ini --no-error-summary --exclude "(app/api/v1/test_users\.py|app/schemas/buildable\.py|app/api/v1/users_secure\.py)"'
        language: system
        types: [python]
        pass_filenames: false
        files: ^backend/app/(api|schemas)/
        exclude: ^backend/app/(api/v1/test_users\.py|schemas/buildable\.py|api/v1/users_secure\.py)$

  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v4.6.0
    hooks:
      - id: end-of-file-fixer
      - id: trailing-whitespace
      - id: check-yaml
        args: [--allow-multiple-documents, --unsafe]
        exclude: ^infra/helm/
      - id: check-merge-conflict

  - repo: https://github.com/psf/black
    rev: 24.8.0 # MUST match requirements.txt and requirements-dev.txt
    hooks:
      - id: black
        args: ['--line-length=88']
        files: ^(backend|app|core|db|jurisdictions|scripts|tests|uvicorn_app|prefect|jobs|samples)/

  - repo: https://github.com/astral-sh/ruff-pre-commit
    rev: v0.6.9
    hooks:
      - id: ruff
        args: ['--fix']
        files: ^(backend|app|core|db|jurisdictions|scripts|tests|uvicorn_app|prefect|jobs|samples)/

  - repo: https://github.com/PyCQA/flake8
    rev: 7.1.1
    hooks:
      - id: flake8
        additional_dependencies: [flake8-bugbear==24.8.19]
        files: ^(backend/tests|tests)/

  - repo: https://github.com/PyCQA/bandit
    rev: 1.7.10
    hooks:
      - id: bandit
        args: ['-r', '-c', 'bandit.yaml']
        files: ^backend/app/
        exclude: ^backend/app/.*test.*\.py$

  - repo: https://github.com/pre-commit/mirrors-mypy
    rev: v1.7.1
    hooks:
      - id: mypy
        name: mypy-backend
        files: ^backend/
        args: [--config-file=mypy.ini]
        pass_filenames: false
        additional_dependencies:
          - fastapi==0.121.3
          - uvicorn[standard]==0.24.0
          - pydantic[email]==2.12.5
          - pydantic==2.12.5
          - sqlalchemy[asyncio]==2.0.23
          - asyncpg==0.29.0
          - alembic==1.13.0
          - python-multipart==0.0.22
          - bcrypt==5.0.0
          - httpx==0.25.2
          - python-dateutil==2.8.2
          - prefect==2.20.17
          - structlog==23.2.0
          - prometheus-client==0.19.0

  - repo: local
    hooks:
      - id: prettier
        name: prettier
        entry: npx --prefix frontend prettier --check
        language: system
        files: ^frontend/.*\.(js|jsx|ts|tsx|css|json|md)$
        exclude: ^frontend/node_modules/
      - id: prettier-admin
        name: prettier-admin
        entry: npx --prefix ui-admin prettier --check
        language: system
        files: ^ui-admin/.*\.(js|jsx|ts|tsx|css|json|md)$
        exclude: ^ui-admin/node_modules/

  - repo: local
    hooks:
      - id: eslint
        name: eslint
        entry: npm --prefix frontend run lint
        language: system
        pass_filenames: false
        files: ^frontend/.*\.(js|jsx|ts|tsx)$
        exclude: ^frontend/node_modules/
      - id: eslint-admin
        name: eslint-admin
        entry: npx --prefix ui-admin eslint
        language: system
        files: ^ui-admin/.*\.(js|jsx|ts|tsx)$
        exclude: ^ui-admin/(node_modules/|eslint\.config\.js$)
