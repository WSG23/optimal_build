name: CI

on:
  push:
    branches:
      - main
  pull_request:

env:
  PYTHON_VERSION: '3.11'
  NODE_VERSION: '20'

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  changes:
    name: Detect Changes
    runs-on: ubuntu-latest
    timeout-minutes: 5
    outputs:
      frontend: ${{ steps.filter.outputs.frontend }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Detect changed paths
        id: filter
        uses: dorny/paths-filter@v3
        with:
          filters: |
            frontend:
              - 'frontend/**'

  lint:
    name: Lint & Format
    runs-on: ubuntu-latest
    timeout-minutes: 20
    needs: changes
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: 'pip'
          cache-dependency-path: backend/requirements-dev.txt

      - name: Install lint dependencies
        run: |
          pip install -r backend/requirements-dev.txt

      - name: Validate warning allowlist
        run: python scripts/check_warning_allowlist.py --fail-on-expired

      - name: Set up Node.js for pre-commit hooks
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'
          cache-dependency-path: |
            frontend/package-lock.json
            ui-admin/package-lock.json

      - name: Install frontend pre-commit dependencies
        run: |
          npm --prefix frontend ci
          npm --prefix ui-admin ci

      - name: Run pre-commit hooks
        run: pre-commit run --all-files --show-diff-on-failure

      - name: Run frontend lint
        if: needs.changes.outputs.frontend == 'true'
        run: npm --prefix frontend run lint

  typecheck:
    name: Type Check
    runs-on: ubuntu-latest
    timeout-minutes: 25
    needs: changes
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: 'pip'
          cache-dependency-path: backend/requirements-dev.txt

      - name: Install backend type-check dependencies
        run: |
          pip install -r backend/requirements-dev.txt

      - name: Run type guardrails
        shell: bash
        run: |
          set -euo pipefail
          args=(--config-only)
          base=""
          if [ "${{ github.event_name }}" = "pull_request" ]; then
            base="${{ github.event.pull_request.base.sha }}"
          elif [ -n "${{ github.event.before }}" ] && [ "${{ github.event.before }}" != "0000000000000000000000000000000000000000" ]; then
            base="${{ github.event.before }}"
          fi
          if [ -n "$base" ]; then
            git fetch --no-tags origin "$base" || true
            args+=(--diff-base "$base")
          fi
          python scripts/check_type_guardrails.py "${args[@]}"

      - name: Enforce backend type ignore budget
        run: python scripts/check_type_ignore_budget.py

      - name: Validate mypy regression baseline
        run: python scripts/check_mypy_baseline.py --json-output artifacts/mypy-delta.json

      - name: Run backend mypy
        run: mypy --config-file mypy.ini

      - name: Set up Node.js
        if: needs.changes.outputs.frontend == 'true'
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json

      - name: Install frontend dependencies
        if: needs.changes.outputs.frontend == 'true'
        run: npm --prefix frontend ci

      - name: Run frontend type checks
        if: needs.changes.outputs.frontend == 'true'
        run: npm --prefix frontend run typecheck

  build:
    name: Build
    runs-on: ubuntu-latest
    timeout-minutes: 20
    needs: changes
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: 'pip'
          cache-dependency-path: backend/requirements.txt

      - name: Install backend runtime dependencies
        run: |
          pip install -r backend/requirements.txt

      - name: Enforce backend import budgets
        run: python backend/scripts/check_import_budget.py

      - name: Compile backend sources
        run: python -m compileall backend

      - name: Set up Node.js
        if: needs.changes.outputs.frontend == 'true'
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json

      - name: Install frontend dependencies
        if: needs.changes.outputs.frontend == 'true'
        run: npm --prefix frontend ci

      - name: Build frontend application
        if: needs.changes.outputs.frontend == 'true'
        run: npm --prefix frontend run build

  tests:
    name: Tests
    runs-on: ubuntu-latest
    timeout-minutes: 45
    needs:
      - build
      - changes
    env:
      POSTGRES_SERVER: 127.0.0.1
      POSTGRES_DB: building_compliance
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: password
      POSTGRES_PORT: '5432'
      REDIS_URL: redis://127.0.0.1:6379
      CELERY_BROKER_URL: redis://127.0.0.1:6379/0
      CELERY_RESULT_BACKEND: redis://127.0.0.1:6379/1
      RQ_REDIS_URL: redis://127.0.0.1:6379/2
      S3_ENDPOINT: http://127.0.0.1:9000
      S3_ACCESS_KEY: minioadmin
      S3_SECRET_KEY: minioadmin
      IMPORTS_BUCKET_NAME: cad-imports
      EXPORTS_BUCKET_NAME: cad-exports
      PYTHONPATH: backend
      CI_ARTIFACTS: ${{ github.workspace }}/artifacts
      REFERENCE_STORAGE: ${{ github.workspace }}/artifacts/reference_storage
      VITE_API_BASE_URL: http://127.0.0.1:8000/
      CI: 'true'
      # CI runs Python via setup-python (no .venv); override Makefile defaults
      # that point at .venv/bin/python.
      PY: python
      # Point Alembic and seeders at the Postgres service brought up by
      # docker-compose; otherwise the Makefile falls back to DEV_SQLITE_URL.
      SQLALCHEMY_DATABASE_URI: postgresql+asyncpg://postgres:password@127.0.0.1:5432/building_compliance
      # Required by app.core.config.Settings; only used outside the
      # pytest auto-fallback (e.g. when Alembic loads settings).
      SECRET_KEY: ci-secret-key
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: 'pip'
          cache-dependency-path: backend/requirements-dev.txt

      - name: Install backend dependencies
        run: |
          pip install -r backend/requirements-dev.txt

      - name: Set up Node.js
        if: needs.changes.outputs.frontend == 'true'
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json

      - name: Install frontend dependencies
        if: needs.changes.outputs.frontend == 'true'
        run: npm --prefix frontend ci

      - name: Cache Playwright browsers
        if: needs.changes.outputs.frontend == 'true'
        uses: actions/cache@v4
        with:
          path: ~/.cache/ms-playwright
          key: playwright-${{ runner.os }}-${{ hashFiles('frontend/package-lock.json', 'frontend/package.json') }}
          restore-keys: |
            playwright-${{ runner.os }}-

      - name: Install Playwright browsers
        if: needs.changes.outputs.frontend == 'true'
        run: npm --prefix frontend exec playwright -- install --with-deps

      - name: Start backing services
        run: |
          docker compose -f docker-compose.yml up -d postgres redis minio

      - name: Wait for services
        run: |
          set -euo pipefail
          postgres_ready=false
          for attempt in $(seq 1 30); do
            if docker compose -f docker-compose.yml exec -T postgres pg_isready -U "$POSTGRES_USER"; then
              postgres_ready=true
              break
            fi
            sleep 2
          done
          if [ "$postgres_ready" != "true" ]; then
            echo "Postgres did not become ready in time" >&2
            exit 1
          fi
          docker compose -f docker-compose.yml exec -T redis redis-cli ping
          minio_ready=false
          for attempt in $(seq 1 30); do
            if curl -sSf http://127.0.0.1:9000/minio/health/live > /dev/null; then
              minio_ready=true
              break
            fi
            sleep 2
          done
          if [ "$minio_ready" != "true" ]; then
            echo "Minio did not become ready in time" >&2
            exit 1
          fi

      - name: Prepare smoke artifacts
        run: |
          mkdir -p "$CI_ARTIFACTS"
          mkdir -p "$REFERENCE_STORAGE"

      - name: Run database migrations
        run: make db.upgrade

      - name: Seed reference data
        # Docker Compose is available, but only postgres/redis/minio are
        # running — there is no `backend` service container, so force the
        # Makefile to take the local-python branch.
        run: make seed-data DOCKER_COMPOSE=

      - name: Seed non-regulatory datasets
        run: |
          if make -n seed-nonreg >/dev/null 2>&1; then
            make seed-nonreg
          else
            echo "seed-nonreg target not present; skipping"
          fi

      - name: Run watch_fetch ingestion smoke
        run: |
          python -m backend.flows.watch_fetch \
            --once \
            --offline \
            --storage-path "$REFERENCE_STORAGE" \
            --summary-path "$CI_ARTIFACTS/watch_fetch_summary.json"

      - name: Run parse_segment ingestion smoke
        run: |
          python -m backend.flows.parse_segment \
            --once \
            --storage-path "$REFERENCE_STORAGE" \
            --summary-path "$CI_ARTIFACTS/parse_segment_summary.json" \
            --min-documents 1 \
            --min-clauses 1

      - name: Verify ingestion artifacts
        run: |
          python - <<'PY'
          import json
          import os
          from pathlib import Path

          artifacts = Path(os.environ["CI_ARTIFACTS"])
          watch_summary = json.loads((artifacts / "watch_fetch_summary.json").read_text())
          if watch_summary.get("document_count", 0) <= 0:
              raise SystemExit("watch_fetch ingestion produced no documents")

          parse_summary = json.loads((artifacts / "parse_segment_summary.json").read_text())
          if parse_summary.get("clause_count", 0) <= 0:
              raise SystemExit("parse_segment ingestion produced no clauses")
          PY

      - name: Launch backend API for smoke tests
        run: |
          # Capture uvicorn output so we can surface tracebacks if a smoke
          # request fails (uvicorn is backgrounded; without redirection its
          # logs are otherwise lost when the step ends).
          python -m uvicorn app.main:app \
            --host 0.0.0.0 \
            --port 8000 \
            --log-level info \
            > "$CI_ARTIFACTS/backend-smoke.log" 2>&1 &
          echo $! > "$RUNNER_TEMP/backend-e2e.pid"
        working-directory: backend

      - name: Wait for backend readiness
        run: |
          set -euo pipefail
          for attempt in $(seq 1 40); do
            if curl -sSf http://127.0.0.1:8000/health > /dev/null; then
              exit 0
            fi
            sleep 2
          done
          echo "Backend API did not become ready in time" >&2
          exit 1

      - name: Run buildable screening smoke
        run: |
          set -euo pipefail
          payload='{"address":"123 Example Ave","typ_floor_to_floor_m":3.4,"efficiency_ratio":0.8}'
          # Capture status + body separately so a non-2xx response is logged
          # in full (curl -sSf would otherwise discard the body and print
          # only the HTTP code).
          status=$(curl -sS -o "$CI_ARTIFACTS/buildable_response.json" \
            -w '%{http_code}' \
            -X POST http://127.0.0.1:8000/api/v1/screen/buildable \
            -H 'content-type: application/json' \
            -d "$payload")
          if [ "$status" != "200" ]; then
            echo "::error::buildable smoke returned HTTP $status"
            echo '--- response body ---'
            cat "$CI_ARTIFACTS/buildable_response.json" || true
            echo
            exit 1
          fi
          python - <<'PY'
          import json
          import os
          from pathlib import Path

          artifacts = Path(os.environ["CI_ARTIFACTS"])
          data = json.loads((artifacts / "buildable_response.json").read_text())
          metrics = data.get("metrics") or {}
          if "zone_code" not in data:
              raise SystemExit("zone_code missing from buildable response")
          if "gfa_cap_m2" not in metrics:
              raise SystemExit("gfa_cap_m2 missing from buildable metrics")
          PY

      - name: Dump backend smoke log on failure
        if: failure()
        run: |
          if [ -f "$CI_ARTIFACTS/backend-smoke.log" ]; then
            echo '--- backend-smoke.log (tail) ---'
            tail -n 200 "$CI_ARTIFACTS/backend-smoke.log"
          else
            echo "no backend-smoke.log found"
          fi

      - name: Fetch OpenAPI schema
        run: |
          curl -sSf http://127.0.0.1:8000/openapi.json -o "$CI_ARTIFACTS/openapi.json"

      - name: Stop backend API
        if: always()
        run: |
          if [ -f "$RUNNER_TEMP/backend-e2e.pid" ]; then
            PID=$(cat "$RUNNER_TEMP/backend-e2e.pid")
            if ps -p "$PID" > /dev/null 2>&1; then
              kill "$PID"
              for attempt in $(seq 1 15); do
                if ps -p "$PID" > /dev/null 2>&1; then
                  sleep 1
                else
                  break
                fi
              done
              if ps -p "$PID" > /dev/null 2>&1; then
                kill -9 "$PID" || true
              fi
            fi
            rm -f "$RUNNER_TEMP/backend-e2e.pid"
          fi

      - name: Run backend tests
        run: |
          cd backend
          pytest -q --maxfail=1 --cov=app --cov-report=xml --cov-fail-under=80 \
            --junitxml="$CI_ARTIFACTS/backend-junit.xml" \
            --durations=25 --durations-min=1.0 \
            tests/test_api/test_rules.py \
            tests/test_flows/test_watch_fetch_flow.py \
            tests/test_flows/test_parse_segment_flow.py \
            ../tests/finance/test_finance_smoke.py \
            tests/pwp/test_buildable_latency.py \
            tests/pwp/test_buildable_metrics.py \
            tests/test_integration/test_preview_job_integration.py

      - name: Run finance release gate
        run: |
          cd backend
          pytest -q \
            tests/test_services/test_finance_golden_deals.py \
            tests/test_api/test_finance_workbook.py \
            tests/test_api/test_finance_origin_classification.py \
            tests/test_api/test_audit.py \
            tests/test_core/test_audit_ledger.py

      - name: Enforce backend runtime budgets
        run: |
          python backend/scripts/check_runtime_budget.py \
            --junit-xml "$CI_ARTIFACTS/backend-junit.xml" \
            --markdown-output "$CI_ARTIFACTS/runtime-budget-summary.md" \
            --json-output "$CI_ARTIFACTS/runtime-budget-summary.json"

      - name: Collect coverage artifact
        run: |
          mkdir -p "$CI_ARTIFACTS"
          if [ -f backend/coverage.xml ]; then
            cp backend/coverage.xml "$CI_ARTIFACTS/backend-coverage.xml"
          fi

      - name: Run frontend unit tests
        if: needs.changes.outputs.frontend == 'true'
        run: npm --prefix frontend run test:coverage

      - name: Run frontend end-to-end tests
        env:
          PLAYWRIGHT_SKIP_BROWSER_INSTALL: '1'
        if: needs.changes.outputs.frontend == 'true'
        run: npm --prefix frontend run test:e2e

      - name: Stop services
        if: always()
        timeout-minutes: 5
        run: docker compose -f docker-compose.yml down --remove-orphans

      - name: Upload backend artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: backend-artifacts
          path: artifacts
          if-no-files-found: warn
          retention-days: 7

      - name: Upload Playwright artifacts
        if: always() && needs.changes.outputs.frontend == 'true'
        uses: actions/upload-artifact@v4
        with:
          name: frontend-playwright
          path: |
            frontend/test-results
            frontend/playwright-report
          if-no-files-found: warn
          retention-days: 7

  security:
    name: Security Scan
    runs-on: ubuntu-latest
    timeout-minutes: 15
    needs: tests
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: 'pip'
          cache-dependency-path: backend/requirements.txt

      - name: Install dependencies
        run: |
          pip install -r backend/requirements.txt
          pip install pip-audit

      - name: Run pip-audit with expiring allowlist
        run: |
          python scripts/run_pip_audit_with_allowlist.py --requirements backend/requirements.txt || true
          echo "⚠️  Vulnerability scan completed. Review output above."
          echo "Note: Some vulnerabilities (e.g., ecdsa timing attack) are accepted risks."

      - name: Run gitleaks
        uses: gitleaks/gitleaks-action@v2
        with:
          args: detect --redact
