[mypy]
python_version = 3.11
strict = True
follow_imports = skip
files = backend/app/utils, backend/app/services/reference_parsers.py
mypy_path = backend
plugins = pydantic.mypy, sqlalchemy.ext.mypy.plugin
explicit_package_bases = True

[mypy-fastapi]
follow_imports = normal

[mypy-fastapi.*]
follow_imports = normal

[mypy-importlib]
ignore_missing_imports = True

[mypy-importlib.*]
ignore_missing_imports = True

[mypy-sqlalchemy]
ignore_errors = True

[mypy-sqlalchemy.*]
ignore_errors = True

# Per-module ignores (use both backend.app and app prefixes for different contexts)
[mypy-backend.app.services.developer_checklist_service]
ignore_errors = True

[mypy-app.services.developer_checklist_service]
ignore_errors = True

[mypy-pydantic]
follow_imports = normal
ignore_errors = True

[mypy-pydantic.*]
follow_imports = normal
ignore_errors = True

[mypy-app.utils.validators]
follow_imports = normal

# _typing.py is the casting-boundary helper for the vendored pydantic stub,
# which under-types model_validate as returning BaseModel (not Self). Errors
# inside this single helper file are tolerated by design.
[mypy-app.schemas._typing]
ignore_errors = True

[mypy-structlog]
ignore_missing_imports = True

[mypy-structlog.*]
ignore_missing_imports = True

[mypy-httpx]
ignore_errors = True

[mypy-httpx.*]
ignore_errors = True

[mypy-ezdxf]
ignore_missing_imports = True

[mypy-ezdxf.*]
ignore_missing_imports = True

[mypy-ifcopenshell]
ignore_missing_imports = True

[mypy-ifcopenshell.*]
ignore_missing_imports = True

[mypy-reportlab.*]
ignore_missing_imports = True

[mypy-weasyprint]
ignore_missing_imports = True

[mypy-weasyprint.*]
ignore_missing_imports = True

[mypy-backend._compat.*]
ignore_missing_imports = True

[pydantic-mypy]
init_forbid_extra = True
init_typed = True
warn_required_dynamic_aliases = True
warn_untyped_fields = True
